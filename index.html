<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>異世界との境界</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
width:100%;
height:100vh;
overflow:hidden;
background:black;
position:relative;
}

/* ==========================
   LAPIS
========================== */

.lapis-bg{

position:absolute;

top:0;
left:0;

width:100%;
height:50%;

background:
linear-gradient(
to bottom,
#ffffff 0%,
#edf7ff 60%,
#c8e7ff 100%
);

overflow:hidden;
}

.lapis-bg::before{

content:"";

position:absolute;
inset:0;

background:

radial-gradient(
circle at 20% 20%,
rgba(255,255,255,.95) 0 120px,
transparent 260px
),

radial-gradient(
circle at 80% 15%,
rgba(255,255,255,.85) 0 160px,
transparent 320px
);

animation:
cloudMove 35s linear infinite;
}

/* ==========================
   ABYSS
========================== */

.abyss-bg{

position:absolute;

bottom:0;
left:0;

width:100%;
height:50%;

background:
linear-gradient(
to bottom,
#2b0036 0%,
#120018 50%,
#000000 100%
);

overflow:hidden;
}

.abyss-bg::before{

content:"";

position:absolute;

width:1200px;
height:1200px;

left:50%;
top:50%;

transform:
translate(-50%,-50%);

background:
url("images/magic-circle.png")
center/contain no-repeat;

opacity:.08;

animation:
rotateCircle 120s linear infinite;
}

/* ==========================
   境界の黒い靄
========================== */

.boundary{

position:absolute;

left:0;
top:50%;

transform:translateY(-50%);

width:100%;
height:120px;

pointer-events:none;

z-index:20;

background:

linear-gradient(
to bottom,

transparent,

rgba(0,0,0,.18),

rgba(0,0,0,.55),

rgba(0,0,0,.18),

transparent
);

filter:blur(35px);

opacity:.9;

animation:
mistFlow 8s ease-in-out infinite;
}

.boundary::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(
circle at 25% 50%,
rgba(0,0,0,.45),
transparent 35%
),

radial-gradient(
circle at 75% 50%,
rgba(0,0,0,.45),
transparent 35%
),

radial-gradient(
circle at 50% 50%,
rgba(0,0,0,.6),
transparent 40%
);

filter:blur(25px);

animation:
mistMove 14s ease-in-out infinite;
}

/* ==========================
   ポータル
========================== */

.portal{

position:absolute;

left:0;

width:100%;
height:50%;

display:flex;

justify-content:center;
align-items:center;

cursor:pointer;

z-index:100;
}

.lapis{
top:0;
}

.abyss{
bottom:0;
}

/* ==========================
   タイトル
========================== */

.name{

font-size:90px;

font-weight:300;

letter-spacing:18px;

opacity:.65;

transition:.5s;

user-select:none;
}

/* LAPIS */

.lapis .name{

color:#7b22ff;

text-shadow:
0 0 15px #7b22ff,
0 0 40px #7b22ff;
}

/* ABYSS */

.abyss .name{

color:#d9ecff;

text-shadow:
0 0 15px #d9ecff,
0 0 40px #d9ecff;
}

.portal:hover .name{

opacity:1;

letter-spacing:28px;

transform:scale(1.08);
}

/* ==========================
   ワープ演出
========================== */

#transition{

position:fixed;
inset:0;

opacity:0;

pointer-events:none;

z-index:99999;
}

/* ==========================
   アニメーション
========================== */

@keyframes rotateCircle{

from{
transform:
translate(-50%,-50%)
rotate(0deg);
}

to{
transform:
translate(-50%,-50%)
rotate(360deg);
}

}

@keyframes cloudMove{

from{
transform:translateX(-60px);
}

to{
transform:translateX(60px);
}

}

@keyframes mistFlow{

0%,100%{
opacity:.8;
}

50%{
opacity:1;
}

}

@keyframes mistMove{

0%,100%{
transform:translateX(-40px);
}

50%{
transform:translateX(40px);
}

}

/* ==========================
   スマホ
========================== */

@media(max-width:768px){

.name{

font-size:52px;
letter-spacing:8px;
}

.portal:hover .name{

letter-spacing:12px;
}

}
/* ==========================
   導入演出
========================== */

#intro{

position:fixed;
inset:0;

background:black;

display:flex;
justify-content:center;
align-items:center;

z-index:999999;

transition:2s;
}

#introText{

color:white;

font-size:32px;

letter-spacing:4px;

text-align:center;

opacity:0;

transition:1s;

text-shadow:
0 0 10px white,
0 0 30px white;
}

#skipBtn{

position:absolute;

right:20px;
bottom:20px;

color:#888;

cursor:pointer;

font-size:14px;
letter-spacing:2px;
}

#skipBtn:hover{
color:white;
}
</style>
</head>

<body>
<div id="intro">

<div id="introText"></div>

<div id="skipBtn" onclick="skipIntro()">
SKIP
</div>

</div>
<div class="lapis-bg"></div>

<div class="abyss-bg"></div>

<div class="boundary"></div>

<div class="portal lapis" onclick="enterLapis()">
<div class="name">LAPIS</div>
</div>

<div class="portal abyss" onclick="enterAbyss()">
<div class="name">ABYSS</div>
</div>

<div id="transition"></div>

<script>

function enterAbyss(){

const t =
document.getElementById("transition");

t.style.transition =
"1.5s";

t.style.background =
"radial-gradient(circle,#b04cff 0%,black 80%)";

t.style.opacity = 1;

setTimeout(()=>{

location.href="about.html";

},3000);

}

function enterLapis(){

const t =
document.getElementById("transition");

t.style.transition="1.5s";

t.style.background=
"radial-gradient(circle,#6fdcff 0%,#dff8ff 40%,white 100%)";

t.style.opacity=1;

setTimeout(()=>{

location.href="lapis_about.html";

},1500);

}
function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

const voices=[

"私の声が聞こえますか？",

"境界へようこそ。",

"まだ引き返せます。",

"あなたはどちらを選びますか？",

"ここは世界と世界の狭間。",

"迷いは悪いことではありません。",

"光はあなたを待っています。",

"深淵はあなたを拒みません。",

"その選択を忘れないでください。",

"運命はもう動き始めています。"

];

async function introSequence(){

const intro=
document.getElementById("intro");

const text=
document.getElementById("introText");

const msg=
voices[Math.floor(
Math.random()*voices.length
)];

await sleep(800);

text.style.opacity=1;

for(let i=0;i<msg.length;i++){

text.innerText+=msg[i];

await sleep(90);

}

await sleep(2500);

text.style.opacity=0;

await sleep(1500);

intro.style.opacity=0;

await sleep(2000);

intro.style.display="none";

}

function skipIntro(){

const intro=
document.getElementById("intro");

intro.style.display="none";

}

window.addEventListener(
"load",
introSequence
);

function skipIntro(){

const intro =
document.getElementById("intro");

intro.style.transition = "0.5s";
intro.style.opacity = "0";

setTimeout(()=>{

intro.style.display = "none";

const t =
document.getElementById("transition");

t.style.background = "black";
t.style.opacity = "1";
t.style.transition = "0.5s";

setTimeout(()=>{

t.style.opacity = "0";

},100);

},500);

}
</script>

</body>
</html>
