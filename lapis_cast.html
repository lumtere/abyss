<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>異世界ラピス - キャスト一覧</title>

<style>
#sidebar{

position:fixed;

left:0;
top:0;

width:220px;
height:100vh;

background:rgba(0,0,0,.85);

#sidebar a.active{
color:#6fdcff;
}

padding-top:40px;

z-index:1000;

backdrop-filter:blur(10px);

}

#sidebar a{

display:block;

padding:15px 25px;

color:#ddd;

text-decoration:none;

font-size:18px;

transition:.2s;

}

#sidebar a:hover{

background:rgba(111,220,255,.15);

color:#fff;

text-shadow:
0 0 10px #6fdcff;

}

#sidebar a.active{

background:rgba(111,220,255,.12);

color:#fff;

font-weight:bold;

border-left:4px solid #6fdcff;

box-shadow:
inset 0 0 15px rgba(111,220,255,.2);

text-shadow:
0 0 10px #6fdcff,
0 0 20px #6fdcff;

}
/* ==========================
   ベース
========================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Yu Gothic",sans-serif;
}

body{
background:
linear-gradient(
180deg,
#061322,
#0d2440,
#16385f
);
color:white;
min-height:100vh;
overflow-x:hidden;
margin-left:220px;
}

/* ==========================
   魔法陣
========================== */

body::before{
content:"";
position:fixed;
width:900px;
height:900px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:url("images/magic-circle.png") center/contain no-repeat;
opacity:0.08;
pointer-events:none;

/* ここ変更 */
z-index:0;

animation:rotateCircle 120s linear infinite;
}

#content{
position:relative;
z-index:1;
}

@keyframes rotateCircle{
from{
transform:translate(-50%,-50%) rotate(0deg);
}
to{
transform:translate(-50%,-50%) rotate(360deg);
}
}

/* ==========================
   タイトル
========================== */

.title{
padding-top:80px;
text-align:center;
font-size:32px;
letter-spacing:4px;
}

#progress{
text-align:center;
margin-bottom:25px;

font-size:20px;

color:#6fdcff;

text-shadow:
0 0 10px #6fdcff,
0 0 20px #6fdcff;
}
/* ==========================
   種族タイトル
========================== */

.section-title{
margin:30px 20px 10px;
padding-left:12px;
border-left:6px solid;
font-size:24px;
}

.succubus{
border-color:#ff4fd8;
}

.demon{
border-color:#ff4040;
}

.angel{
border-color:#6fdcff;
}

.majin{
border-color:#4cff84;
}

.beast{
border-color:#ff9d2e;
}

.youko{
border-color:#b04cff;
}

/* ==========================
   グリッド
========================== */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:18px;
padding:10px 20px;
}

/* ==========================
   カード
========================== */

.card{
background:#111;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
border:2px solid #333;

position:relative;
z-index:5;
}

.card.completed{
border:4px solid gold !important;

box-shadow:
0 0 20px gold,
0 0 40px gold,
0 0 60px gold;
}

.card.completed .card-name{
color:gold;
}
.card:hover{
transform:translateY(-4px) scale(1.03);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-info{
padding:10px;
}

.card-name{
font-size:18px;
font-weight:bold;
}

.card-race{
opacity:.7;
margin-top:4px;
}

/* 種族色 */

.card.succubus{
border-color:#ff4fd8;
}

.card.demon{
border-color:#ff4040;
}

.card.angel{
border-color:#6fdcff;
}

.card.majin{
border-color:#4cff84;
}

.card.beast{
border-color:#ff9d2e;
}

.card.youko{
border-color:#b04cff;
}

/* ==========================
   モーダル
========================== */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
width:1200px;
height:700px;
background:rgba(15,15,25,.95);
display:flex;
overflow:hidden;
border-radius:18px;
position:relative;
}

/* 左 */

.modal-left{
width:45%;
background:black;
}

.modal-left img{
width:100%;
height:100%;
object-fit:cover;
}

/* 右 */

.modal-right{
padding:35px;
flex:1;
overflow-y:auto;

scrollbar-width:none;
-ms-overflow-style:none;
}

.modal-right::-webkit-scrollbar{
display:none;
}

.modal-name{
font-size:48px;
margin-bottom:8px;
}

.modal-race{
font-size:22px;
opacity:.8;
margin-bottom:20px;
}

/* 閉じる */

.close{
position:absolute;
right:25px;
top:15px;
font-size:42px;
cursor:pointer;
user-select:none;
}
/* ==========================
   スマホ用メニュー
========================== */

#menuBtn{
display:none;
position:fixed;
top:15px;
left:15px;
z-index:2000;

width:50px;
height:50px;

border:none;
border-radius:10px;

background:rgba(0,0,0,.8);
color:#6fdcff;

font-size:28px;
cursor:pointer;

box-shadow:
0 0 10px rgba(176,76,255,.5);
}

/* スマホ */

@media (max-width:768px){

body{
margin-left:0;
}

/* ハンバーガー */

#menuBtn{
display:block;
z-index:100000;
}

/* サイドバー */

#sidebar{

width:180px;

left:-180px;

padding-top:80px;

background:rgba(0,0,0,.96);

transition:.8s;

z-index:99999;
}

#sidebar a{
padding:18px 25px;
}

#sidebar.open{
left:0;
}

/* タイトル位置 */

.title{
padding-top:80px;
text-align:center;
font-size:32px;
}

/* カード余白 */

.grid{
padding:10px;
}

/* 顔が切れないように */

.card img{
object-position:top;
}

/* モーダルをスマホ用に */

.modal-content{

width:95vw;
height:90vh;

flex-direction:column;
}

/* 上画像 */

.modal-left{
width:100%;
height:40%;
}

.modal-left img{
object-position:top;
}

/* 下テキスト */

.modal-right{
padding:15px;
}

/* 名前サイズ */

.modal-name{
font-size:30px;
}

/* 閉じるボタン */

.close{

font-size:50px;

right:10px;
top:10px;

width:60px;
height:60px;

display:flex;
justify-content:center;
align-items:center;

z-index:100000;
}
#unlockText{
font-size:22px;
text-align:center;
padding:0 20px;
}

} 

/* ==========================
   入力欄
========================== */

border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.unlock-btn:hover{
transform:translateY(-2px);
box-shadow:0 0 15px rgba(176,76,255,.6);
}

.unlock-btn{
padding:10px 18px;
border:none;
background:#6fdcff;
color:white;
cursor:pointer;
border-radius:8px;
margin-left:8px;
}

/* ==========================
   ギャラリー
========================== */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.gallery img{
width:100%;
height:130px;
object-fit:cover;
cursor:pointer;
border-radius:8px;
transition:.2s;
}

.gallery img:hover{
transform:scale(1.03);
}

/* ==========================
   画像拡大
========================== */

#viewer{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

#viewer img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* ==========================
   解放演出
========================== */

#unlockText{
font-size:40px;
color:#6fdcff;
text-shadow:
0 0 10px #6fdcff,
0 0 20px #6fdcff;
}

.particle{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
pointer-events:none;
z-index:9999;

background:radial-gradient(
circle,
rgba(255,255,255,1) 0%,
rgba(111,220,255,0.8) 40%,
rgba(111,220,255,0.1) 100%
);

filter:blur(1px);

animation:magicFloat 1.8s ease-out forwards;
}

@keyframes magicFloat{

0%{
opacity:1;
transform:
translate(-50%,-50%)
scale(1);
}

100%{
opacity:0;
transform:
translate(-50%,-80px)
scale(0.2);
}

}

</style>
</head>

<body>
<button id="menuBtn">☰</button>

<nav id="sidebar">

<a href="index.html">TOP</a>

<a href="lapis_about.html">ラピスについて</a>

<a href="lapis_join.html">参加方法</a>

<a href="lapis_cast.html" class="active">キャスト一覧</a>

<a href="lapis_contact.html">連絡</a>

</nav>

<h1 class="title">
キャスト一覧
</h1>

<!-- 悪魔 -->
<h2 class="section-title demon">悪魔</h2>
<div id="demon" class="grid"></div>

<!-- 天使 -->
<h2 class="section-title angel">天使</h2>
<div id="angel" class="grid"></div>

<!-- 魔獣 -->
<h2 class="section-title beast">魔獣</h2>
<div id="beast" class="grid"></div>

<!-- 妖 -->
<h2 class="section-title youko">妖</h2>
<div id="youko" class="grid"></div>

<!-- ==========================
     モーダル
========================== -->

<div class="modal" id="modal" onclick="closeModal()">

<div class="close" onclick="closeModal()">
×
</div>

<div class="modal-content" onclick="event.stopPropagation()">

<div class="modal-left">
<img id="m_img">
</div>

<div class="modal-right">

<h2 class="modal-name" id="m_name"></h2>

<div class="modal-race" id="m_race"></div>

<hr style="margin:20px 0;">

<h3>プロフィール</h3>

<p id="m_desc">
プロフィール未設定
</p>

<br>


</div>

<div id="secret" style="display:none;">

<hr style="margin:20px 0;">

<h3>秘匿記録Ⅰ</h3>
<p id="secret1" style="margin-bottom:30px;"></p>

<h3>秘匿記録Ⅱ</h3>
<p id="secret2" style="margin-bottom:30px;"></p>

<h3>深淵の記録</h3>

<div class="gallery" id="gallery"></div>

</div>

</div>
</div>
</div>



<script>

const data=[


/* =====================
   悪魔
===================== */

{
name:"アリマ・ジャケル",
race:"悪魔",
type:"demon",
img:"lapis_images/arima/portrait.png",
code:"6",
desc:`ここにプロフィールを入力`,


},

{
name:"ベル",
race:"悪魔",
type:"demon",
img:"lapis_images/bel/portrait.png",
code:"6",
desc:`ここにプロフィールを入力`,

},

{
name:"レイ",
race:"悪魔",
type:"demon",
img:"lapis_images/rei/portrait.png",
code:"6",
desc:`ここにプロフィールを入力`,

},

{
name:"リン",
race:"悪魔",
type:"demon",
img:"lapis_images/rin/portrait.png",
code:"6",
desc:`ここにプロフィールを入力`,

},

{
name:"さくららて（仮）",
race:"悪魔",
type:"demon",
img:"lapis_images/sakurarate/portrait.png",
code:"6",
desc:`ここにプロフィールを入力`,

},
/* =====================
   天使
===================== */

{
name:"カルミエル",
race:"天使",
type:"angel",
img:"lapis_images/kalmiel/portrait.png",
code:"13",
desc:`ここにプロフィールを入力`,

},

{
name:"ミカ",
race:"天使",
type:"angel",
img:"lapis_images/mika/portrait.png",
code:"13",
desc:`ここにプロフィールを入力`,

},

{
name:"ナチェル",
race:"天使",
type:"angel",
img:"lapis_images/nachel/portrait.png",
code:"13",
desc:`ここにプロフィールを入力`,

},

{
name:"ノイズ",
race:"堕天使",
type:"angel",
img:"lapis_images/noiz/portrait.png",
code:"13",
desc:`ここにプロフィールを入力`,

},

{
name:"天使 恋",
race:"堕天使",
type:"angel",
img:"lapis_images/ren/portrait.png",
code:"13",
desc:`ここにプロフィールを入力`,

},

/* =====================
   魔獣
===================== */

{
name:"アーテル",
race:"ケットシー",
type:"beast",
img:"lapis_images/artel/portrait.png",
code:"37",
desc:`ここにプロフィールを入力`,

},

{
name:"ネロ",
race:"人狼",
type:"beast",
img:"lapis_images/nelo/portrait.png",
code:"37",
desc:`ここにプロフィールを入力`,

},
/* =====================
   妖
===================== */

{
name:"宵蛇",
race:"蛇神",
type:"youko",
img:"lapis_images/yoibami/portrait.png",
code:"23",
desc:`ここにプロフィールを入力`,

},

];

const unlockedCasts =
JSON.parse(localStorage.getItem("unlockedCasts") || "[]");

/* =====================
   グループ
===================== */

const groups={
demon:document.getElementById("demon"),
angel:document.getElementById("angel"),
beast:document.getElementById("beast"),
youko:document.getElementById("youko")
};

/* =====================
   カード生成
===================== */


data.forEach((c,i)=>{
//金色解禁は下をコメントアウトする
//const isUnlocked = false;

//金色解禁は下を//をハズス
const isUnlocked=
unlockedCasts.includes(c.name);

groups[c.type].innerHTML+=`

<div
id="card-${i}"
class="card ${c.type} ${isUnlocked ? "completed" : ""}"
onclick="openC(${i})">

<img src="${c.img}">

<div class="card-info">
<div class="card-name">${c.name}</div>
<div class="card-race">${c.race}</div>
</div>

</div>

`;

});
/* 観測数表示 */

let current=null;

/* =====================
   モーダル
===================== */

function openC(i){

current=data[i];

current.unlocked =
JSON.parse(
localStorage.getItem("unlockedCasts") || "[]"
).includes(current.name);

document.getElementById("modal").style.display="flex";

document.body.style.overflow="hidden";

document.getElementById("m_img").src=current.img;
document.getElementById("m_name").innerText=current.name;
document.getElementById("m_race").innerText=current.race;
document.getElementById("m_desc").innerText=current.desc;
document.getElementById("secret1").innerText =
current.secret1 || "";

document.getElementById("secret2").innerText =
current.secret2 || "";
// ←ここ追加


const gallery=document.getElementById("gallery");

gallery.innerHTML="";

}

function closeModal(){

document.getElementById("modal").style.display="none";

document.body.style.overflow="";

}

/* =====================
   ギャラリー拡大
===================== */

function openViewer(i){

document.getElementById("viewer").style.display="flex";

document.getElementById("viewerImg").src=
current.gallery[i];

}

/* =====================
   マウス魔力エフェクト
===================== */

if(window.innerWidth > 768){

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

document.addEventListener("mousemove",(e)=>{

    mouseX = e.clientX;
    mouseY = e.clientY;

});

setInterval(()=>{

    const p=document.createElement("div");

    p.className="particle";

    p.style.left =
        (mouseX + (Math.random()*30-15)) + "px";

    p.style.top =
        (mouseY + (Math.random()*30-15)) + "px";

    document.body.appendChild(p);

    setTimeout(()=>{
        p.remove();
    },1800);

},60);

}

/* =====================
   ハンバーガーメニュー
===================== */

const menuBtn =
document.getElementById("menuBtn");

const sidebar =
document.getElementById("sidebar");

menuBtn.addEventListener("click",()=>{

    sidebar.classList.toggle("open");

});

</script>
<div id="flash"></div>
</body>
</html>
